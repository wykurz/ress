name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# least-privilege token: jobs only check out and build/test the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # proptest seeds are random per run; more cases per property raises the odds
  # a bad seed fires on the PR run instead of after the merge, but properties
  # are no longer all microsecond-cheap: the heaviest, the line-index oracle,
  # is data-volume-bound and measures ~7.5ms/case in the debug job. so the
  # count is budgeted rather than maximized: 1024 runs that property in ~7.7s
  # in the debug job, the debug and release jobs together still draw ~2k
  # fresh cases per property per PR, and the committed proptest-regressions
  # corpus replays every previously-found counterexample regardless of this
  # setting.
  PROPTEST_CASES: 1024

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      with:
        components: rustfmt, clippy
    - name: Format
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy --workspace --all-targets --features ress-core/bench-internals -- -D warnings
    - name: Docs
      run: cargo doc --no-deps --workspace

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
    - name: Install cargo-nextest
      uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
      with:
        tool: cargo-nextest
    - name: Test (debug)
      run: cargo nextest run --workspace
    - name: Doctests (debug)
      run: cargo test --doc --workspace

  test-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
    - name: Install cargo-nextest
      uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
      with:
        tool: cargo-nextest
    - name: Test (release)
      run: cargo nextest run --workspace --release
    - name: Doctests (release)
      run: cargo test --doc --workspace --release
    # cargo's bench profile inherits the release profile's settings and
    # target/release output directory, so this reuses the dependency
    # artifacts this job already built in release mode above instead of
    # paying a second from-scratch release-profile compile in a job that
    # otherwise never builds in release mode (lint/test/nix do not).
    # --no-run is the bit-rot guard used locally (just bench-build): it
    # never runs a single sample, so machine-dependent numbers still never
    # gate a merge, but bench code that no longer compiles now fails CI
    # the same way the local gate already catches it.
    - name: Bench build (no run)
      run: cargo bench --workspace --no-run --features ress-core/bench-internals

  nix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
    # The cargo jobs above never touch Nix, so a flake.lock bump (Dependabot opens
    # grouped nix PRs) could break `nix build` or the dev shell while CI stays
    # green. Determinate Nix's `nix flake check` only *evaluates* outputs (it skips
    # the builds), so it covers cross-platform eval here -- including the
    # darwin/aarch64 outputs this linux runner can't build -- while the explicit
    # build + dev-shell steps catch build-level breakage on this system.
    - name: Flake check (evaluate all systems)
      # --no-update-lock-file makes CI fail (rather than silently regenerate the
      # lock in the writable checkout) if flake.nix and flake.lock drift apart,
      # e.g. an input was edited without committing the updated flake.lock.
      run: nix flake check --all-systems -L --no-update-lock-file
    - name: Build the package
      run: nix build -L .#default
    - name: Build the dev shell
      run: nix develop -L --command true
